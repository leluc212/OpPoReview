<!DOCTYPE html>
<html>
<head>
    <title>Test Application API</title>
</head>
<body>
    <h1>Test Application API</h1>
    <button onclick="testGetApplications()">Test Get Applications</button>
    <pre id="result"></pre>

    <script>
        async function testGetApplications() {
            const API_ENDPOINT = 'https://zbkgla009i.execute-api.us-east-1.amazonaws.com';
            const token = prompt('Enter JWT token:');
            
            if (!token) return;
            
            // Extract userId from token
            const payload = JSON.parse(atob(token.split('.')[1]));
            const userId = payload.sub;
            
            console.log('User ID:', userId);
            
            try {
                const response = await fetch(`${API_ENDPOINT}/applications/candidate/${userId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token
                    }
                });
                
                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
                console.log('Response:', data);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
