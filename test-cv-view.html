<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test CV View</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .section {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 14px;
        }
        input {
            width: 400px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #2563eb;
        }
        .result {
            background: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
        }
        .success {
            background: #d1fae5;
            color: #059669;
        }
    </style>
</head>
<body>
    <h1>🔍 Test CV View</h1>
    
    <div class="section">
        <h3>1. Get CV Info</h3>
        <input type="text" id="userId" placeholder="User ID" value="296aa58c-30a1-70cc-44ed-b829e33a8245">
        <button onclick="getCVInfo()">Get CV Info</button>
        <div id="cvInfoResult" class="result"></div>
    </div>

    <div class="section">
        <h3>2. Test CV URL</h3>
        <input type="text" id="cvUrl" placeholder="CV URL từ bước 1">
        <button onclick="testCVUrl()">Test URL</button>
        <button onclick="openCV()">Open CV</button>
        <div id="urlTestResult" class="result"></div>
    </div>

    <script>
        const API_BASE_URL = 'https://v56v542h8f.execute-api.ap-southeast-1.amazonaws.com/prod';

        async function getCVInfo() {
            const userId = document.getElementById('userId').value;
            const resultDiv = document.getElementById('cvInfoResult');
            
            try {
                resultDiv.textContent = 'Loading...';
                resultDiv.className = 'result';
                
                const response = await fetch(`${API_BASE_URL}/cv/${userId}`);
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = JSON.stringify(data, null, 2);
                    
                    // Auto-fill CV URL
                    if (data.cvUrl) {
                        document.getElementById('cvUrl').value = data.cvUrl;
                    }
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Error: ' + error.message;
            }
        }

        async function testCVUrl() {
            const cvUrl = document.getElementById('cvUrl').value;
            const resultDiv = document.getElementById('urlTestResult');
            
            if (!cvUrl) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Please enter CV URL';
                return;
            }
            
            try {
                resultDiv.textContent = 'Testing URL...';
                resultDiv.className = 'result';
                
                const response = await fetch(cvUrl, { method: 'HEAD' });
                
                if (response.ok) {
                    const headers = {};
                    response.headers.forEach((value, key) => {
                        headers[key] = value;
                    });
                    
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ URL is valid!\n\nStatus: ${response.status}\nHeaders:\n${JSON.stringify(headers, null, 2)}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `❌ URL failed!\n\nStatus: ${response.status}\nStatus Text: ${response.statusText}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ Error: ' + error.message + '\n\nThis might be a CORS issue or the URL is invalid/expired.';
            }
        }

        function openCV() {
            const cvUrl = document.getElementById('cvUrl').value;
            
            if (!cvUrl) {
                alert('Please enter CV URL');
                return;
            }
            
            const newWindow = window.open(cvUrl, '_blank');
            
            if (!newWindow) {
                alert('Popup blocked! Please allow popups and try again.');
            }
        }
    </script>
</body>
</html>
