<!DOCTYPE html>
<html>
<head>
    <title>Debug Notification Timestamp</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        .section { margin: 20px 0; padding: 15px; background: #252526; border-left: 4px solid #007acc; }
        .error { border-left-color: #f48771; }
        .success { border-left-color: #89d185; }
        h2 { margin-top: 0; color: #4ec9b0; }
        pre { background: #1e1e1e; padding: 10px; overflow-x: auto; }
        button { padding: 10px 20px; background: #007acc; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background: #005a9e; }
    </style>
</head>
<body>
    <h1>🔍 Notification Timestamp Debugger</h1>
    
    <button onclick="runDebug()">▶️ Run Debug</button>
    
    <div id="output"></div>
    
    <script>
        const API_ENDPOINT = 'https://rvvvqxqhq3.execute-api.ap-southeast-1.amazonaws.com/prod';
        
        async function runDebug() {
            const output = document.getElementById('output');
            output.innerHTML = '<div class="section">⏳ Loading...</div>';
            
            try {
                // Fetch notifications
                const response = await fetch(`${API_ENDPOINT}/notifications?recipientId=admin&recipientRole=admin`);
                const notifications = await response.json();
                
                // Sort by newest first
                notifications.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                
                const latest = notifications[0];
                const createdAt = new Date(latest.createdAt);
                const now = new Date();
                const ageMs = now - createdAt;
                const ageMinutes = Math.floor(ageMs / 60000);
                const ageHours = Math.floor(ageMinutes / 60);
                
                let html = '';
                
                // Latest notification info
                html += `<div class="section">
                    <h2>📋 Latest Notification</h2>
                    <pre>ID: ${latest.notificationId}
Title: ${latest.title}
CreatedAt: ${latest.createdAt}</pre>
                </div>`;
                
                // Timestamp analysis
                html += `<div class="section">
                    <h2>⏰ Timestamp Analysis</h2>
                    <pre>Created (UTC): ${createdAt.toISOString()}
Created (Local): ${createdAt.toLocaleString('vi-VN')}
Now (UTC): ${now.toISOString()}
Now (Local): ${now.toLocaleString('vi-VN')}
Age: ${ageMinutes} minutes (${ageHours} hours)</pre>
                </div>`;
                
                // Expected display
                let expectedDisplay;
                if (ageMinutes < 1) {
                    expectedDisplay = 'Vừa xong / Just now';
                } else if (ageMinutes < 60) {
                    expectedDisplay = `${ageMinutes} phút trước / ${ageMinutes} minutes ago`;
                } else {
                    expectedDisplay = `${ageHours} giờ trước / ${ageHours} hours ago`;
                }
                
                html += `<div class="section">
                    <h2>📱 Expected UI Display</h2>
                    <pre>Should show: ${expectedDisplay}</pre>
                </div>`;
                
                // Diagnosis
                if (ageHours >= 6) {
                    html += `<div class="section error">
                        <h2>❌ PROBLEM FOUND</h2>
                        <pre>Notification is ${ageHours} hours old!

This means:
1. Lambda is NOT creating new timestamps, OR
2. Lambda server clock is wrong, OR
3. You are looking at an OLD notification

SOLUTION:
- Check Lambda CloudWatch logs
- Verify Lambda code is deployed
- Make sure you're looking at the NEWEST notification</pre>
                    </div>`;
                } else {
                    html += `<div class="section success">
                        <h2>✅ TIMESTAMP IS CORRECT</h2>
                        <pre>Notification is only ${ageHours} hours old.

If UI shows "7 giờ trước", you are looking at a DIFFERENT (older) notification!

Find notification with ID: ${latest.notificationId}</pre>
                    </div>`;
                }
                
                // All notifications
                html += `<div class="section">
                    <h2>📊 All Notifications (Top 10)</h2>
                    <pre>`;
                
                notifications.slice(0, 10).forEach((n, i) => {
                    const age = Math.floor((now - new Date(n.createdAt)) / 60000);
                    html += `${i+1}. ${n.notificationId}
   Title: ${n.title}
   Age: ${age} minutes (${Math.floor(age/60)} hours)
   
`;
                });
                
                html += `</pre></div>`;
                
                output.innerHTML = html;
                
            } catch (error) {
                output.innerHTML = `<div class="section error">
                    <h2>❌ ERROR</h2>
                    <pre>${error.message}\n\n${error.stack}</pre>
                </div>`;
            }
        }
    </script>
</body>
</html>
