<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Notification API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1e293b;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .section {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
        }
        .section h2 {
            color: #334155;
            margin-bottom: 15px;
            font-size: 18px;
        }
        button {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }
        button.danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        button.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        .log {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 15px;
        }
        .log-entry {
            margin-bottom: 6px;
            padding: 6px 10px;
            border-radius: 4px;
            border-left: 3px solid transparent;
        }
        .log-success { 
            background: rgba(16, 185, 129, 0.15); 
            color: #6ee7b7; 
            border-left-color: #10b981;
        }
        .log-error { 
            background: rgba(239, 68, 68, 0.15); 
            color: #fca5a5; 
            border-left-color: #ef4444;
        }
        .log-info { 
            background: rgba(59, 130, 246, 0.15); 
            color: #93c5fd; 
            border-left-color: #3b82f6;
        }
        .log-warning { 
            background: rgba(245, 158, 11, 0.15); 
            color: #fcd34d; 
            border-left-color: #f59e0b;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #3b82f6;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 600;
        }
        .endpoint {
            background: #1e293b;
            color: #93c5fd;
            padding: 10px 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-top: 10px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug Notification API</h1>
        
        <div class="section">
            <h2>📡 API Endpoint</h2>
            <div class="endpoint" id="apiEndpoint">Loading...</div>
        </div>

        <div class="section">
            <h2>🧪 Test Actions</h2>
            <button onclick="testCreateNotification()" class="success">
                ✅ Test Create Notification
            </button>
            <button onclick="testGetNotifications()">
                📋 Get Admin Notifications
            </button>
            <button onclick="testGetAllNotifications()">
                📚 Get All Notifications
            </button>
            <button onclick="checkDynamoDB()">
                🗄️ Check DynamoDB
            </button>
            <button onclick="testFullFlow()">
                🚀 Test Full Flow
            </button>
            <button onclick="clearLogs()" class="danger">
                🧹 Clear Logs
            </button>
        </div>

        <div class="section">
            <h2>📊 Statistics</h2>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalNotifications">0</div>
                    <div class="stat-label">Total Notifications</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="adminNotifications">0</div>
                    <div class="stat-label">Admin Notifications</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="unreadCount">0</div>
                    <div class="stat-label">Unread</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="apiStatus">?</div>
                    <div class="stat-label">API Status</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>📝 Debug Logs</h2>
            <div id="logs" class="log">Waiting for action...</div>
        </div>
    </div>

    <script>
        const API_ENDPOINT = 'https://iuo7ofruu6.execute-api.ap-southeast-1.amazonaws.com';
        
        document.getElementById('apiEndpoint').textContent = API_ENDPOINT;

        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString('vi-VN', { hour12: false });
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(`[${type.toUpperCase()}]`, message);
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '<div class="log-entry log-info">Logs cleared</div>';
        }

        async function testCreateNotification() {
            log('🚀 Starting notification creation test...', 'info');
            
            const notification = {
                type: 'package_purchase_request',
                title: 'Yêu cầu mua gói dịch vụ mới',
                titleEn: 'New Package Purchase Request',
                message: 'Công ty Test ABC yêu cầu mua gói Hot Search (7 ngày) - Giá: 245,000 VND',
                messageEn: 'Test Company ABC requested to purchase Hot Search package (7 days) - Price: 245,000 VND',
                recipientId: 'admin',
                recipientRole: 'admin',
                senderId: 'test-employer-' + Date.now(),
                senderName: 'Công ty Test ABC',
                data: {
                    subscriptionId: 'SUB-TEST-' + Date.now(),
                    packageName: 'Hot Search',
                    duration: '7 ngày',
                    price: 245000,
                    employerId: 'test-employer-' + Date.now(),
                    companyName: 'Công ty Test ABC'
                },
                icon: 'package',
                color: '#3b82f6',
                actionUrl: '/admin/packages',
                actionText: 'Xem chi tiết',
                actionTextEn: 'View Details'
            };

            log('📦 Notification payload:', 'info');
            log(JSON.stringify(notification, null, 2), 'info');

            try {
                log('📤 Sending POST request...', 'info');
                const startTime = Date.now();
                
                const response = await fetch(`${API_ENDPOINT}/notifications`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=utf-8',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(notification)
                });

                const duration = Date.now() - startTime;
                log(`📡 Response received in ${duration}ms`, 'info');
                log(`   Status: ${response.status} ${response.statusText}`, 'info');
                log(`   Headers: ${JSON.stringify(Object.fromEntries(response.headers.entries()), null, 2)}`, 'info');

                const responseText = await response.text();
                log(`📄 Response body (raw): ${responseText}`, 'info');

                if (!response.ok) {
                    log(`❌ HTTP Error: ${response.status}`, 'error');
                    log(`   Response: ${responseText}`, 'error');
                    document.getElementById('apiStatus').textContent = '❌';
                    return;
                }

                const result = JSON.parse(responseText);
                
                if (result.success) {
                    log('✅ SUCCESS! Notification created', 'success');
                    log(`   ID: ${result.data.notificationId}`, 'success');
                    log(`   Title: ${result.data.title}`, 'success');
                    log(`   Message: ${result.data.message}`, 'success');
                    log(`   Recipient: ${result.data.recipientId} (${result.data.recipientRole})`, 'success');
                    log(`   Created: ${result.data.createdAt}`, 'success');
                    document.getElementById('apiStatus').textContent = '✅';
                    
                    // Update stats
                    await updateStats();
                } else {
                    log(`❌ API returned success=false`, 'error');
                    log(`   Error: ${result.error || 'Unknown'}`, 'error');
                    document.getElementById('apiStatus').textContent = '❌';
                }
            } catch (error) {
                log(`❌ Exception: ${error.message}`, 'error');
                log(`   Stack: ${error.stack}`, 'error');
                document.getElementById('apiStatus').textContent = '❌';
            }
        }

        async function testGetNotifications() {
            log('📥 Getting admin notifications...', 'info');
            
            try {
                const response = await fetch(`${API_ENDPOINT}/notifications?recipientId=admin&recipientRole=admin`);
                
                if (!response.ok) {
                    log(`❌ HTTP Error: ${response.status}`, 'error');
                    return;
                }

                const notifications = await response.json();
                log(`✅ Found ${notifications.length} admin notifications`, 'success');
                
                document.getElementById('adminNotifications').textContent = notifications.length;
                
                const unread = notifications.filter(n => !n.read && !n.deleted).length;
                document.getElementById('unreadCount').textContent = unread;
                
                notifications.slice(0, 5).forEach((notif, index) => {
                    log(`\n[${index + 1}] ${notif.title}`, 'info');
                    log(`    ID: ${notif.notificationId}`, 'info');
                    log(`    Message: ${notif.message}`, 'info');
                    log(`    Created: ${notif.createdAt}`, 'info');
                    log(`    Read: ${notif.read ? 'Yes' : 'No'}`, 'info');
                });
                
                if (notifications.length > 5) {
                    log(`\n... and ${notifications.length - 5} more`, 'info');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function testGetAllNotifications() {
            log('📚 Getting all notifications...', 'info');
            
            try {
                const response = await fetch(`${API_ENDPOINT}/notifications`);
                
                if (!response.ok) {
                    log(`❌ HTTP Error: ${response.status}`, 'error');
                    return;
                }

                const notifications = await response.json();
                log(`✅ Total: ${notifications.length} notifications`, 'success');
                
                document.getElementById('totalNotifications').textContent = notifications.length;
                
                const byRole = notifications.reduce((acc, n) => {
                    acc[n.recipientRole] = (acc[n.recipientRole] || 0) + 1;
                    return acc;
                }, {});
                
                log('\nBreakdown by role:', 'info');
                Object.entries(byRole).forEach(([role, count]) => {
                    log(`   ${role}: ${count}`, 'info');
                });
                
                const byType = notifications.reduce((acc, n) => {
                    acc[n.type] = (acc[n.type] || 0) + 1;
                    return acc;
                }, {});
                
                log('\nBreakdown by type:', 'info');
                Object.entries(byType).forEach(([type, count]) => {
                    log(`   ${type}: ${count}`, 'info');
                });
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function checkDynamoDB() {
            log('🗄️ Checking DynamoDB via API...', 'info');
            log('Note: This checks via API, not direct DynamoDB access', 'warning');
            
            await testGetAllNotifications();
            
            log('\n💡 To check DynamoDB directly, run:', 'info');
            log('aws dynamodb scan --table-name Notifications --region ap-southeast-1 --max-items 5', 'info');
        }

        async function testFullFlow() {
            log('🚀 Starting FULL FLOW TEST...', 'info');
            log('This simulates employer purchasing a package', 'info');
            
            // Step 1: Create notification
            log('\n[Step 1/3] Creating notification...', 'info');
            await testCreateNotification();
            
            await sleep(2000);
            
            // Step 2: Verify it was created
            log('\n[Step 2/3] Verifying notification was created...', 'info');
            await testGetNotifications();
            
            await sleep(1000);
            
            // Step 3: Check stats
            log('\n[Step 3/3] Updating statistics...', 'info');
            await updateStats();
            
            log('\n✅ FULL FLOW TEST COMPLETE!', 'success');
        }

        async function updateStats() {
            try {
                const [allResponse, adminResponse] = await Promise.all([
                    fetch(`${API_ENDPOINT}/notifications`),
                    fetch(`${API_ENDPOINT}/notifications?recipientId=admin&recipientRole=admin`)
                ]);
                
                if (allResponse.ok && adminResponse.ok) {
                    const all = await allResponse.json();
                    const admin = await adminResponse.json();
                    
                    document.getElementById('totalNotifications').textContent = all.length;
                    document.getElementById('adminNotifications').textContent = admin.length;
                    
                    const unread = admin.filter(n => !n.read && !n.deleted).length;
                    document.getElementById('unreadCount').textContent = unread;
                    
                    document.getElementById('apiStatus').textContent = '✅';
                }
            } catch (error) {
                console.error('Error updating stats:', error);
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Auto-load stats on page load
        window.addEventListener('load', async () => {
            log('🎉 Debug page loaded!', 'success');
            log(`📡 API Endpoint: ${API_ENDPOINT}`, 'info');
            log('Ready to debug...', 'info');
            
            await updateStats();
        });
    </script>
</body>
</html>
