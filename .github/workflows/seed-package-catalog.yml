name: Seed Package Catalog

on:
  workflow_dispatch:
    inputs:
      createTable:
        description: 'Create PackageCatalog table if missing? (yes/no)'
        required: false
        default: 'no'

jobs:
  seed:
    name: Seed DynamoDB PackageCatalog
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3
          pip install awscli

      - name: (Optional) Create PackageCatalog table if requested
        if: ${{ github.event.inputs.createTable == 'yes' }}
        run: |
          set -e
          echo "Checking for table PackageCatalog..."
          if aws dynamodb describe-table --table-name PackageCatalog >/dev/null 2>&1; then
            echo "Table PackageCatalog exists."
          else
            echo "Table PackageCatalog not found. Creating..."
            aws dynamodb create-table \
              --table-name PackageCatalog \
              --attribute-definitions AttributeName=packageId,AttributeType=S \
              --key-schema AttributeName=packageId,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region ${{ secrets.AWS_REGION }}
            aws dynamodb wait table-exists --table-name PackageCatalog --region ${{ secrets.AWS_REGION }}
            echo "Table created."
          fi

      - name: Seed PackageCatalog (non-interactive)
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python scripts/seed_package_catalog.py --table PackageCatalog --region ${{ secrets.AWS_REGION }} --yes

      - name: Describe table after seeding
        run: |
          aws dynamodb describe-table --table-name PackageCatalog --region ${{ secrets.AWS_REGION }}
