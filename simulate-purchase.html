<!DOCTYPE html>
<html>
<head>
    <title>Simulate Purchase Flow</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .log { background: #f5f5f5; padding: 10px; margin: 5px 0; border-radius: 5px; font-family: monospace; font-size: 12px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        button { background: #1e40af; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 10px 5px; }
        button:hover { background: #1e3a8a; }
        #logs { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🧪 Simulate Employer Purchase Flow</h1>
    <p>This simulates exactly what happens when an employer clicks "Confirm Purchase"</p>
    
    <button onclick="simulatePurchase()">🛒 Simulate Purchase</button>
    <button onclick="clearLogs()">🗑️ Clear Logs</button>
    <button onclick="checkNotifications()">📬 Check Admin Notifications</button>
    
    <div id="logs"></div>

    <script type="module">
        // Simulate the exact environment from the React app
        const VITE_NOTIFICATIONS_API = 'https://iuo7ofruu6.execute-api.ap-southeast-1.amazonaws.com';
        const VITE_PACKAGE_SUBSCRIPTIONS_API = 'https://p0nd7frlhg.execute-api.ap-southeast-1.amazonaws.com';

        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const logEntry = document.createElement('div');
            logEntry.className = `log ${type}`;
            logEntry.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
            logsDiv.appendChild(logEntry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(message);
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }

        // Copy-paste the EXACT function from notificationService.js
        async function createPackagePurchaseRequestNotification(subscription) {
            log('📝 Creating package purchase notification with data: ' + JSON.stringify(subscription, null, 2));
            
            const notification = {
                type: 'package_purchase_request',
                title: 'Yêu cầu mua gói dịch vụ mới',
                titleEn: 'New Package Purchase Request',
                message: `${subscription.companyName} yêu cầu mua gói ${subscription.packageName} (${subscription.duration}) - Giá: ${subscription.price.toLocaleString('vi-VN')} VND`,
                messageEn: `${subscription.companyName} requested to purchase ${subscription.packageName} package (${subscription.duration}) - Price: ${subscription.price.toLocaleString('vi-VN')} VND`,
                recipientId: 'admin',
                recipientRole: 'admin',
                senderId: subscription.employerId,
                senderName: subscription.companyName,
                data: {
                    subscriptionId: subscription.subscriptionId,
                    packageName: subscription.packageName,
                    duration: subscription.duration,
                    price: subscription.price,
                    employerId: subscription.employerId,
                    companyName: subscription.companyName
                },
                icon: 'package',
                color: '#3b82f6',
                actionUrl: '/admin/packages',
                actionText: 'Xem chi tiết',
                actionTextEn: 'View Details'
            };

            log('📤 Sending notification to API with UTF-8 encoding:');
            log('   API Endpoint: ' + VITE_NOTIFICATIONS_API);
            log('   ⚠️ CRITICAL: recipientId = ' + notification.recipientId + ' (must be "admin")');
            log('   ⚠️ CRITICAL: recipientRole = ' + notification.recipientRole + ' (must be "admin")');
            
            const result = await saveNotification(notification);
            log('✅ Notification API response: ' + JSON.stringify(result, null, 2));
            
            if (result && result.success) {
                log('✅ Notification created successfully with ID: ' + result.data?.notificationId, 'success');
            } else {
                log('❌ Notification creation may have failed: ' + JSON.stringify(result), 'error');
            }
            
            return result;
        }

        async function saveNotification(notification) {
            try {
                log('💾 Saving notification to API...');
                log('API Endpoint: ' + VITE_NOTIFICATIONS_API);
                log('API Endpoint type: ' + typeof VITE_NOTIFICATIONS_API);
                log('API Endpoint value: ' + (VITE_NOTIFICATIONS_API ? 'EXISTS' : 'UNDEFINED'));
                
                if (!VITE_NOTIFICATIONS_API) {
                    const error = new Error('❌ CRITICAL: API_ENDPOINT is undefined! Check .env file.');
                    log(error.message, 'error');
                    throw error;
                }
                
                const notificationToSend = {
                    ...notification,
                    title: notification.title || '',
                    titleEn: notification.titleEn || notification.title || '',
                    message: notification.message || '',
                    messageEn: notification.messageEn || notification.message || '',
                    recipientId: notification.recipientId || '',
                    recipientRole: notification.recipientRole || '',
                    senderId: notification.senderId || 'system',
                    senderName: notification.senderName || 'System',
                    icon: notification.icon || 'bell',
                    color: notification.color || '#3b82f6',
                    actionUrl: notification.actionUrl || '',
                    actionText: notification.actionText || '',
                    actionTextEn: notification.actionTextEn || ''
                };
                
                const notificationJson = JSON.stringify(notificationToSend);
                log('Notification JSON length: ' + notificationJson.length + ' bytes');
                
                const url = `${VITE_NOTIFICATIONS_API}/notifications`;
                log('🌐 Full URL: ' + url);
                log('📤 Making POST request with UTF-8 encoding...');
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=utf-8',
                        'Accept': 'application/json'
                    },
                    body: notificationJson
                });
                
                log('✅ Response received!');
                log('API Response status: ' + response.status);
                log('API Response statusText: ' + response.statusText);
                
                const responseText = await response.text();
                log('API Response text: ' + responseText);
                
                if (!response.ok) {
                    const errorMsg = `Failed to save notification: ${response.status} ${response.statusText} - ${responseText}`;
                    log('❌ ' + errorMsg, 'error');
                    throw new Error(errorMsg);
                }
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    log('❌ Failed to parse response JSON: ' + parseError.message, 'error');
                    throw new Error(`Invalid JSON response: ${parseError.message}`);
                }
                
                log('✅ Notification saved successfully!', 'success');
                
                if (data.success && data.data) {
                    log('✅ Notification ID: ' + data.data.notificationId, 'success');
                    log('✅ Recipient: ' + data.data.recipientId + ' / ' + data.data.recipientRole, 'success');
                }
                
                return data;
            } catch (error) {
                log('❌ Error saving notification: ' + error.message, 'error');
                log('Error stack: ' + error.stack, 'error');
                throw error;
            }
        }

        // Simulate the EXACT purchase flow from Subscription.jsx
        window.simulatePurchase = async function() {
            clearLogs();
            log('🚀 Starting purchase process...', 'info');
            
            const selectedPackage = { name: 'Quick Boost' };
            const selectedDuration = { duration: '24h', amount: '29,000 VND' };
            const employerId = 'test-employer-html-' + Date.now();
            const companyName = 'Test Company HTML';
            
            const priceString = selectedDuration.amount.replace(/[^0-9]/g, '');
            const packagePrice = parseInt(priceString);
            
            log('   Package: ' + selectedPackage.name);
            log('   Duration: ' + selectedDuration.duration);
            log('   Price: ' + packagePrice);
            log('   Employer: ' + employerId);
            log('   Company: ' + companyName);
            
            const subscriptionId = `SUB-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
            log('   Subscription ID: ' + subscriptionId);
            
            try {
                log('📡 Subscription API: ' + VITE_PACKAGE_SUBSCRIPTIONS_API);
                
                // Try to create subscription (may fail, that's OK)
                try {
                    const response = await fetch(`${VITE_PACKAGE_SUBSCRIPTIONS_API}/subscriptions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json; charset=utf-8' },
                        body: JSON.stringify({
                            employerId: employerId,
                            companyName: companyName,
                            packageName: selectedPackage.name,
                            duration: selectedDuration.duration
                        })
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        log('✅ Subscription created via API: ' + JSON.stringify(result), 'success');
                    } else {
                        log('⚠️ Subscription API returned error: ' + response.status, 'warning');
                        log('   Will still create notification with local subscription ID', 'warning');
                    }
                } catch (apiError) {
                    log('⚠️ Subscription API failed: ' + apiError.message, 'warning');
                    log('   Will still create notification with local subscription ID', 'warning');
                }
                
                // ALWAYS create notification for admin
                log('');
                log('📤 Creating notification for admin...', 'info');
                log('   This is CRITICAL - notification must be created!', 'info');
                
                try {
                    const notificationData = {
                        subscriptionId: subscriptionId,
                        employerId: employerId,
                        companyName: companyName,
                        packageName: selectedPackage.name,
                        duration: selectedDuration.duration,
                        price: packagePrice
                    };
                    
                    log('📦 Notification data: ' + JSON.stringify(notificationData, null, 2));
                    
                    const notificationResult = await createPackagePurchaseRequestNotification(notificationData);
                    
                    log('✅ Notification sent to admin successfully!', 'success');
                    log('   Result: ' + JSON.stringify(notificationResult, null, 2), 'success');
                    
                    if (notificationResult && notificationResult.success) {
                        log('✅ Notification ID: ' + notificationResult.data?.notificationId, 'success');
                        log('✅ Notification saved to DynamoDB!', 'success');
                        log('');
                        log('🎉 PURCHASE PROCESS COMPLETED SUCCESSFULLY!', 'success');
                    } else {
                        log('❌ Notification API returned success=false', 'error');
                        log('   Response: ' + JSON.stringify(notificationResult), 'error');
                    }
                    
                } catch (notifError) {
                    log('❌ CRITICAL ERROR: Failed to create notification!', 'error');
                    log('   Error: ' + notifError.message, 'error');
                    log('   Stack: ' + notifError.stack, 'error');
                    alert('Cảnh báo: Đơn hàng đã được tạo nhưng thông báo cho admin có thể bị lỗi. Vui lòng liên hệ admin để xác nhận.');
                }
                
            } catch (error) {
                log('❌ Error in purchase process: ' + error.message, 'error');
                log('   Stack: ' + error.stack, 'error');
            }
        };

        window.checkNotifications = async function() {
            log('📬 Checking admin notifications...', 'info');
            try {
                const response = await fetch(`${VITE_NOTIFICATIONS_API}/notifications?recipientId=admin&recipientRole=admin`);
                if (response.ok) {
                    const notifications = await response.json();
                    log('✅ Found ' + notifications.length + ' notifications for admin', 'success');
                    notifications.forEach((notif, index) => {
                        log(`   ${index + 1}. [${notif.type}] ${notif.title} - Created: ${notif.createdAt}`, 'info');
                    });
                } else {
                    log('❌ Failed to fetch notifications: ' + response.status, 'error');
                }
            } catch (error) {
                log('❌ Error checking notifications: ' + error.message, 'error');
            }
        };
    </script>
</body>
</html>
