<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Debug Notifications</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        button { padding: 10px 20px; margin: 10px; background: #0e639c; color: white; border: none; cursor: pointer; }
        button:hover { background: #1177bb; }
        pre { background: #252526; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .info { color: #9cdcfe; }
    </style>
</head>
<body>
    <h1>🔍 Debug Notifications API</h1>
    
    <button onclick="testGetAdminNotifications()">Test: Get Admin Notifications</button>
    <button onclick="testCreateTestNotification()">Test: Create Test Notification</button>
    <button onclick="clearResults()">Clear</button>
    
    <div id="results"></div>

    <script>
        const API = 'https://iuo7ofruu6.execute-api.ap-southeast-1.amazonaws.com';
        
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const pre = document.createElement('pre');
            pre.className = type;
            pre.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            results.appendChild(pre);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testGetAdminNotifications() {
            log('📥 Fetching admin notifications...', 'info');
            
            try {
                const url = `${API}/notifications?recipientId=admin&recipientRole=admin`;
                log(`URL: ${url}`, 'info');
                
                const response = await fetch(url);
                log(`Status: ${response.status}`, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                log(`Response:\n${JSON.stringify(data, null, 2)}`, 'success');
                log(`Total notifications: ${Array.isArray(data) ? data.length : 'N/A'}`, 'info');
                
                if (Array.isArray(data) && data.length > 0) {
                    log(`First notification:\n${JSON.stringify(data[0], null, 2)}`, 'info');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                console.error(error);
            }
        }
        
        async function testCreateTestNotification() {
            log('📤 Creating test notification...', 'info');
            
            try {
                const notification = {
                    type: 'package_purchase_request',
                    title: 'TEST: Yêu cầu mua gói',
                    titleEn: 'TEST: Package Request',
                    message: 'Công ty ABC yêu cầu mua gói Quick Boost (24h)',
                    messageEn: 'Company ABC requested Quick Boost (24h)',
                    recipientId: 'admin',
                    recipientRole: 'admin',
                    senderId: 'test-123',
                    senderName: 'Test Company',
                    data: {
                        subscriptionId: 'SUB-TEST-' + Date.now(),
                        packageName: 'Quick Boost',
                        duration: '24h',
                        price: 29000
                    },
                    icon: 'package',
                    color: '#3b82f6',
                    actionUrl: '/admin/packages',
                    actionText: 'Xem chi tiết',
                    actionTextEn: 'View Details'
                };
                
                log(`Payload:\n${JSON.stringify(notification, null, 2)}`, 'info');
                
                const response = await fetch(`${API}/notifications`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=utf-8'
                    },
                    body: JSON.stringify(notification)
                });
                
                log(`Status: ${response.status}`, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                log(`Response:\n${JSON.stringify(data, null, 2)}`, response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    log('✅ Notification created! Now fetch admin notifications to see it.', 'success');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                console.error(error);
            }
        }
        
        // Auto-run on load
        window.onload = () => {
            log('🚀 Debug tool loaded. Click buttons to test.', 'info');
        };
    </script>
</body>
</html>
