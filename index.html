<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ốp Pờ - Nền tảng tuyển dụng hiện đại</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      function fitScreen() {
        const root = document.getElementById('root');
        if (!root) return;
        
        // Sử dụng clientWidth thay vì innerWidth (bỏ đi phần viền thanh cuộn)
        const currentWidth = document.documentElement.clientWidth;
        const baseWidth = 1440;
        
        if (currentWidth < baseWidth) {
          // Tính tỷ lệ và đảm bảo không vượt quá lớn, fit vừa đẹp
          const scale = currentWidth / baseWidth;
          root.style.zoom = scale;
          
          // Firefox cũ ko hỗ trợ zoom
          if (getComputedStyle(root).zoom === undefined || getComputedStyle(root).zoom === 'normal' || getComputedStyle(root).zoom === '') {
             root.style.MozTransform = `scale(${scale})`;
             root.style.MozTransformOrigin = 'top left';
             root.style.width = `${baseWidth}px`;
          }
        } else {
          // Reset nếu màn hình to hơn 1440
          root.style.zoom = 1;
          root.style.MozTransform = 'none';
          root.style.width = '100%';
        }
      }
      
      // Chạy 1 lần khởi tạo
      fitScreen();
      // Chạy mỗi khi có thay đổi size màn hình
      window.addEventListener('resize', fitScreen);
    </script>
  </body>
</html>
