<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Purchase Flow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
        }
        button {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 10px 10px 0;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }
        .log {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-top: 20px;
        }
        .log-success { color: #6ee7b7; }
        .log-error { color: #fca5a5; }
        .log-info { color: #93c5fd; }
        .log-warning { color: #fcd34d; }
        .section {
            margin: 20px 0;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
        }
        .section h2 {
            color: #334155;
            margin-bottom: 15px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Test Purchase Flow</h1>
        <p class="subtitle">Simulate employer purchasing a package</p>

        <div class="section">
            <h2>📦 Simulate Package Purchase</h2>
            <button onclick="simulatePurchase()">🚀 Simulate Full Purchase Flow</button>
            <button onclick="testNotificationOnly()">📤 Test Notification Only</button>
            <button onclick="checkResults()">✅ Check Results</button>
        </div>

        <div class="section">
            <h2>📊 Console Logs</h2>
            <div id="logs" class="log">Ready to test...</div>
        </div>
    </div>

    <script type="module">
        // Import the notification service
        const API_ENDPOINT = 'https://iuo7ofruu6.execute-api.ap-southeast-1.amazonaws.com';
        
        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString('vi-VN');
            const span = document.createElement('div');
            span.className = `log-${type}`;
            span.textContent = `[${timestamp}] ${message}`;
            logsDiv.appendChild(span);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(`[${type}]`, message);
        }

        async function createPackagePurchaseRequestNotification(subscription) {
            log('📝 Creating package purchase notification...', 'info');
            
            const notification = {
                type: 'package_purchase_request',
                title: 'Yêu cầu mua gói dịch vụ mới',
                titleEn: 'New Package Purchase Request',
                message: `${subscription.companyName} yêu cầu mua gói ${subscription.packageName} (${subscription.duration}) - Giá: ${subscription.price.toLocaleString('vi-VN')} VND`,
                messageEn: `${subscription.companyName} requested to purchase ${subscription.packageName} package (${subscription.duration}) - Price: ${subscription.price.toLocaleString('vi-VN')} VND`,
                recipientId: 'admin',
                recipientRole: 'admin',
                senderId: subscription.employerId,
                senderName: subscription.companyName,
                data: {
                    subscriptionId: subscription.subscriptionId,
                    packageName: subscription.packageName,
                    duration: subscription.duration,
                    price: subscription.price,
                    employerId: subscription.employerId,
                    companyName: subscription.companyName
                },
                icon: 'package',
                color: '#3b82f6',
                actionUrl: '/admin/packages',
                actionText: 'Xem chi tiết',
                actionTextEn: 'View Details'
            };

            log(`📤 Sending to: ${API_ENDPOINT}/notifications`, 'info');
            log(`   Payload: ${JSON.stringify(notification, null, 2)}`, 'info');

            try {
                const response = await fetch(`${API_ENDPOINT}/notifications`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=utf-8',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(notification)
                });

                log(`📡 Response: ${response.status} ${response.statusText}`, 'info');

                const result = await response.json();
                
                if (result.success) {
                    log(`✅ Notification created successfully!`, 'success');
                    log(`   ID: ${result.data.notificationId}`, 'success');
                    log(`   Title: ${result.data.title}`, 'success');
                    log(`   Message: ${result.data.message}`, 'success');
                    return result;
                } else {
                    log(`❌ Failed: ${result.error}`, 'error');
                    throw new Error(result.error);
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                throw error;
            }
        }

        window.simulatePurchase = async function() {
            log('🚀 Starting full purchase simulation...', 'info');
            log('', 'info');
            
            // Step 1: Simulate subscription creation
            log('[Step 1/3] Creating subscription...', 'info');
            const subscriptionData = {
                subscriptionId: `SUB-TEST-${Date.now()}`,
                employerId: 'test-employer-123',
                companyName: 'Công ty TNHH Test ABC',
                packageName: 'Hot Search',
                duration: '7 ngày',
                price: 245000
            };
            log(`   Subscription ID: ${subscriptionData.subscriptionId}`, 'info');
            log(`   Company: ${subscriptionData.companyName}`, 'info');
            log(`   Package: ${subscriptionData.packageName} (${subscriptionData.duration})`, 'info');
            log(`   Price: ${subscriptionData.price.toLocaleString('vi-VN')} VND`, 'info');
            
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Step 2: Create notification
            log('', 'info');
            log('[Step 2/3] Creating notification for admin...', 'info');
            try {
                const result = await createPackagePurchaseRequestNotification(subscriptionData);
                log('✅ Notification sent successfully!', 'success');
            } catch (error) {
                log(`❌ Notification failed: ${error.message}`, 'error');
                return;
            }
            
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Step 3: Verify
            log('', 'info');
            log('[Step 3/3] Verifying notification...', 'info');
            try {
                const response = await fetch(`${API_ENDPOINT}/notifications?recipientId=admin&recipientRole=admin`);
                const notifications = await response.json();
                log(`✅ Found ${notifications.length} admin notifications`, 'success');
                
                const latest = notifications[0];
                if (latest) {
                    log(`   Latest: ${latest.title}`, 'success');
                    log(`   Message: ${latest.message}`, 'success');
                }
            } catch (error) {
                log(`❌ Verification failed: ${error.message}`, 'error');
            }
            
            log('', 'info');
            log('🎉 PURCHASE SIMULATION COMPLETE!', 'success');
        };

        window.testNotificationOnly = async function() {
            log('📤 Testing notification creation only...', 'info');
            
            const testData = {
                subscriptionId: `SUB-${Date.now()}`,
                employerId: 'test-emp',
                companyName: 'Test Company',
                packageName: 'Hot Search',
                duration: '7 ngày',
                price: 245000
            };
            
            try {
                await createPackagePurchaseRequestNotification(testData);
                log('✅ Test passed!', 'success');
            } catch (error) {
                log(`❌ Test failed: ${error.message}`, 'error');
            }
        };

        window.checkResults = async function() {
            log('🔍 Checking results...', 'info');
            
            try {
                const response = await fetch(`${API_ENDPOINT}/notifications?recipientId=admin&recipientRole=admin`);
                const notifications = await response.json();
                
                log(`✅ Total admin notifications: ${notifications.length}`, 'success');
                
                notifications.slice(0, 5).forEach((notif, index) => {
                    log(``, 'info');
                    log(`[${index + 1}] ${notif.title}`, 'info');
                    log(`    ID: ${notif.notificationId}`, 'info');
                    log(`    Message: ${notif.message}`, 'info');
                    log(`    Created: ${notif.createdAt}`, 'info');
                });
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        };

        log('✅ Test page loaded successfully!', 'success');
        log(`📡 API Endpoint: ${API_ENDPOINT}`, 'info');
        log('Click a button to start testing...', 'info');
    </script>
</body>
</html>
