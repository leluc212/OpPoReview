<!DOCTYPE html>
<html>
<head>
    <title>Test Candidate Profile API</title>
    <script src="https://cdn.jsdelivr.net/npm/aws-amplify@6/dist/aws-amplify.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { margin: 10px 5px; padding: 10px 20px; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Test Candidate Profile API</h1>
    
    <div>
        <button onclick="checkUser()">1. Check Current User</button>
        <button onclick="getProfile()">2. Get My Profile</button>
        <button onclick="createProfile()">3. Create Profile</button>
        <button onclick="updateProfile()">4. Update Profile</button>
    </div>
    
    <h3>Result:</h3>
    <pre id="result"></pre>

    <script type="module">
        import { Amplify } from 'https://cdn.jsdelivr.net/npm/aws-amplify@6/+esm';
        import { fetchAuthSession, getCurrentUser } from 'https://cdn.jsdelivr.net/npm/aws-amplify@6/auth/+esm';

        // Configure Amplify
        Amplify.configure({
            Auth: {
                Cognito: {
                    userPoolId: 'ap-southeast-1_YugMgAr7H',
                    userPoolClientId: '6n4a6kg7ugq6gah4o8k5dt7dhhh9f',
                    identityPoolId: 'ap-southeast-1:0f7a1zq3t00q5u8r8a1r8qw7zk'
                }
            }
        });

        const API_URL = 'https://xyp4wkszi7.execute-api.ap-southeast-1.amazonaws.com/prod';
        let currentUserId = null;

        async function getAuthToken() {
            const session = await fetchAuthSession();
            return session.tokens?.idToken?.toString();
        }

        window.checkUser = async function() {
            try {
                const session = await fetchAuthSession();
                const user = await getCurrentUser();
                currentUserId = user.userId;
                
                const result = {
                    userId: user.userId,
                    username: user.username,
                    email: session.tokens?.idToken?.payload?.email,
                    idToken: session.tokens?.idToken?.payload
                };
                
                document.getElementById('result').innerHTML = 
                    '<span class="success">✅ User authenticated</span>\n' + 
                    JSON.stringify(result, null, 2);
                console.log('User info:', result);
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<span class="error">❌ Error: ' + error.message + '</span>';
                console.error('Error:', error);
            }
        };

        window.getProfile = async function() {
            try {
                if (!currentUserId) {
                    await checkUser();
                }
                
                const token = await getAuthToken();
                const response = await fetch(`${API_URL}/profile/${currentUserId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('result').innerHTML = 
                        '<span class="success">✅ Profile loaded</span>\n' + 
                        JSON.stringify(data, null, 2);
                } else {
                    document.getElementById('result').innerHTML = 
                        '<span class="error">❌ Error: ' + (data.message || 'Failed to load profile') + '</span>\n' +
                        JSON.stringify(data, null, 2);
                }
                console.log('Profile:', data);
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<span class="error">❌ Error: ' + error.message + '</span>';
                console.error('Error:', error);
            }
        };

        window.createProfile = async function() {
            try {
                if (!currentUserId) {
                    await checkUser();
                }
                
                const session = await fetchAuthSession();
                const email = session.tokens?.idToken?.payload?.email;
                
                const profileData = {
                    fullName: 'Test User',
                    email: email,
                    phone: '0123456789',
                    location: 'Ho Chi Minh City',
                    title: 'Software Developer',
                    bio: 'Test bio'
                };
                
                const token = await getAuthToken();
                const response = await fetch(`${API_URL}/profile`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(profileData)
                });

                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('result').innerHTML = 
                        '<span class="success">✅ Profile created</span>\n' + 
                        JSON.stringify(data, null, 2);
                } else {
                    document.getElementById('result').innerHTML = 
                        '<span class="error">❌ Error: ' + (data.message || 'Failed to create profile') + '</span>\n' +
                        JSON.stringify(data, null, 2);
                }
                console.log('Create result:', data);
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<span class="error">❌ Error: ' + error.message + '</span>';
                console.error('Error:', error);
            }
        };

        window.updateProfile = async function() {
            try {
                if (!currentUserId) {
                    await checkUser();
                }
                
                const updates = {
                    fullName: 'Updated Name',
                    phone: '0987654321',
                    location: 'Hanoi'
                };
                
                const token = await getAuthToken();
                const response = await fetch(`${API_URL}/profile/${currentUserId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updates)
                });

                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('result').innerHTML = 
                        '<span class="success">✅ Profile updated</span>\n' + 
                        JSON.stringify(data, null, 2);
                } else {
                    document.getElementById('result').innerHTML = 
                        '<span class="error">❌ Error: ' + (data.message || 'Failed to update profile') + '</span>\n' +
                        JSON.stringify(data, null, 2);
                }
                console.log('Update result:', data);
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<span class="error">❌ Error: ' + error.message + '</span>';
                console.error('Error:', error);
            }
        };
    </script>
</body>
</html>
