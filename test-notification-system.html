<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Notification System - UTF-8</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
        }
        .section h2 {
            color: #334155;
            margin-bottom: 15px;
            font-size: 20px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .log {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 15px;
        }
        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
        }
        .log-success { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .log-error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .log-info { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }
        .log-warning { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-left: 10px;
        }
        .status-success { background: #d1fae5; color: #065f46; }
        .status-error { background: #fee2e2; color: #991b1b; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #475569;
            font-weight: 600;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔔 Test Notification System</h1>
        <p class="subtitle">Kiểm tra hệ thống thông báo với UTF-8 encoding</p>

        <div class="section">
            <h2>📤 Tạo Thông Báo Test</h2>
            <div class="input-group">
                <label>Company Name (Tên công ty):</label>
                <input type="text" id="companyName" value="Công ty TNHH Công Nghệ ABC" placeholder="Nhập tên công ty...">
            </div>
            <div class="input-group">
                <label>Package Name (Tên gói):</label>
                <input type="text" id="packageName" value="Hot Search" placeholder="Nhập tên gói...">
            </div>
            <div class="input-group">
                <label>Duration (Thời hạn):</label>
                <input type="text" id="duration" value="7 ngày" placeholder="Nhập thời hạn...">
            </div>
            <div class="input-group">
                <label>Price (Giá):</label>
                <input type="number" id="price" value="245000" placeholder="Nhập giá...">
            </div>
            <button onclick="createTestNotification()">🚀 Tạo Thông Báo Test</button>
            <button onclick="createMultipleNotifications()">📦 Tạo 3 Thông Báo</button>
        </div>

        <div class="section">
            <h2>📥 Lấy Thông Báo Admin</h2>
            <button onclick="getAdminNotifications()">📋 Xem Thông Báo Admin</button>
            <button onclick="getUnreadCount()">🔢 Đếm Chưa Đọc</button>
            <button onclick="getAllNotifications()">📚 Xem Tất Cả</button>
        </div>

        <div class="section">
            <h2>🗑️ Xóa Thông Báo</h2>
            <button onclick="clearLogs()">🧹 Xóa Logs</button>
            <button onclick="deleteAllNotifications()">⚠️ Xóa Tất Cả Thông Báo</button>
        </div>

        <div class="section">
            <h2>📊 Console Logs</h2>
            <div id="logs" class="log">Chờ thao tác...</div>
        </div>
    </div>

    <script>
        const API_ENDPOINT = 'https://iuo7ofruu6.execute-api.ap-southeast-1.amazonaws.com';
        
        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString('vi-VN');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(`[${type.toUpperCase()}]`, message);
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = 'Logs đã được xóa...';
            log('Logs cleared', 'info');
        }

        async function createTestNotification() {
            try {
                log('🚀 Bắt đầu tạo thông báo test...', 'info');
                
                const companyName = document.getElementById('companyName').value;
                const packageName = document.getElementById('packageName').value;
                const duration = document.getElementById('duration').value;
                const price = parseInt(document.getElementById('price').value);
                
                const notification = {
                    type: 'package_purchase_request',
                    title: 'Yêu cầu mua gói dịch vụ mới',
                    titleEn: 'New Package Purchase Request',
                    message: `${companyName} yêu cầu mua gói ${packageName} (${duration}) - Giá: ${price.toLocaleString('vi-VN')} VND`,
                    messageEn: `${companyName} requested to purchase ${packageName} package (${duration}) - Price: ${price.toLocaleString('vi-VN')} VND`,
                    recipientId: 'admin',
                    recipientRole: 'admin',
                    senderId: 'test-employer-123',
                    senderName: companyName,
                    data: {
                        subscriptionId: `SUB-${Date.now()}`,
                        packageName: packageName,
                        duration: duration,
                        price: price,
                        employerId: 'test-employer-123',
                        companyName: companyName
                    },
                    icon: 'package',
                    color: '#3b82f6',
                    actionUrl: '/admin/packages',
                    actionText: 'Xem chi tiết',
                    actionTextEn: 'View Details'
                };

                log(`📦 Notification data: ${JSON.stringify(notification, null, 2)}`, 'info');
                log(`🌐 Sending to: ${API_ENDPOINT}/notifications`, 'info');

                const response = await fetch(`${API_ENDPOINT}/notifications`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=utf-8',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(notification)
                });

                log(`📡 Response status: ${response.status} ${response.statusText}`, 'info');

                const result = await response.json();
                
                if (response.ok && result.success) {
                    log(`✅ Thông báo đã được tạo thành công!`, 'success');
                    log(`   ID: ${result.data.notificationId}`, 'success');
                    log(`   Title: ${result.data.title}`, 'success');
                    log(`   Message: ${result.data.message}`, 'success');
                    log(`   Recipient: ${result.data.recipientId} (${result.data.recipientRole})`, 'success');
                } else {
                    log(`❌ Lỗi: ${result.error || 'Unknown error'}`, 'error');
                    log(`   Details: ${JSON.stringify(result)}`, 'error');
                }
            } catch (error) {
                log(`❌ Exception: ${error.message}`, 'error');
                log(`   Stack: ${error.stack}`, 'error');
            }
        }

        async function createMultipleNotifications() {
            log('📦 Tạo 3 thông báo test...', 'info');
            
            const packages = [
                { name: 'Quick Boost', duration: '24h', price: 29000 },
                { name: 'Hot Search', duration: '7 ngày', price: 245000 },
                { name: 'Spotlight Banner', duration: '7 ngày', price: 495000 }
            ];

            for (let i = 0; i < packages.length; i++) {
                document.getElementById('packageName').value = packages[i].name;
                document.getElementById('duration').value = packages[i].duration;
                document.getElementById('price').value = packages[i].price;
                
                await createTestNotification();
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            
            log('✅ Đã tạo xong 3 thông báo!', 'success');
        }

        async function getAdminNotifications() {
            try {
                log('📥 Lấy thông báo cho admin...', 'info');
                
                const response = await fetch(`${API_ENDPOINT}/notifications?recipientId=admin&recipientRole=admin`);
                const notifications = await response.json();
                
                log(`✅ Tìm thấy ${notifications.length} thông báo`, 'success');
                
                notifications.forEach((notif, index) => {
                    log(`\n[${index + 1}] ${notif.title}`, 'info');
                    log(`    Message: ${notif.message}`, 'info');
                    log(`    ID: ${notif.notificationId}`, 'info');
                    log(`    Created: ${notif.createdAt}`, 'info');
                    log(`    Read: ${notif.read ? 'Yes' : 'No'}`, 'info');
                });
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function getUnreadCount() {
            try {
                log('🔢 Đếm thông báo chưa đọc...', 'info');
                
                const response = await fetch(`${API_ENDPOINT}/notifications?recipientId=admin&recipientRole=admin`);
                const notifications = await response.json();
                
                const unreadCount = notifications.filter(n => !n.read && !n.deleted).length;
                
                log(`✅ Có ${unreadCount} thông báo chưa đọc`, 'success');
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function getAllNotifications() {
            try {
                log('📚 Lấy tất cả thông báo...', 'info');
                
                const response = await fetch(`${API_ENDPOINT}/notifications`);
                const notifications = await response.json();
                
                log(`✅ Tổng cộng ${notifications.length} thông báo trong hệ thống`, 'success');
                
                const byRole = notifications.reduce((acc, n) => {
                    acc[n.recipientRole] = (acc[n.recipientRole] || 0) + 1;
                    return acc;
                }, {});
                
                Object.entries(byRole).forEach(([role, count]) => {
                    log(`   ${role}: ${count} thông báo`, 'info');
                });
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function deleteAllNotifications() {
            if (!confirm('⚠️ Bạn có chắc muốn xóa TẤT CẢ thông báo?')) {
                return;
            }
            
            try {
                log('🗑️ Đang xóa tất cả thông báo...', 'warning');
                
                const response = await fetch(`${API_ENDPOINT}/notifications`);
                const notifications = await response.json();
                
                let deleted = 0;
                for (const notif of notifications) {
                    const delResponse = await fetch(`${API_ENDPOINT}/notifications/${notif.notificationId}`, {
                        method: 'DELETE'
                    });
                    if (delResponse.ok) deleted++;
                }
                
                log(`✅ Đã xóa ${deleted}/${notifications.length} thông báo`, 'success');
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        // Auto-load on page load
        window.addEventListener('load', () => {
            log('🎉 Test page loaded successfully!', 'success');
            log(`📡 API Endpoint: ${API_ENDPOINT}`, 'info');
            log('Ready to test notifications...', 'info');
        });
    </script>
</body>
</html>
