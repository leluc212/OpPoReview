<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test UTF-8 Notification</title>
</head>
<body>
    <h1>Test UTF-8 Notification</h1>
    <button onclick="createTestNotification()">Tạo thông báo test</button>
    <button onclick="getNotifications()">Xem thông báo</button>
    <pre id="result"></pre>

    <script>
        const API_ENDPOINT = 'https://iuo7ofruu6.execute-api.ap-southeast-1.amazonaws.com';

        async function createTestNotification() {
            const notification = {
                type: 'test',
                title: 'Yêu cầu mua gói dịch vụ mới',
                titleEn: 'New Package Purchase Request',
                message: 'Công ty cổ phần cafe Katinat yêu cầu mua gói Spotlight Banner (7 ngày)',
                messageEn: 'Katinat Coffee Company requested Spotlight Banner package (7 days)',
                recipientId: 'admin',
                recipientRole: 'admin',
                senderId: 'test@example.com',
                senderName: 'Test User',
                data: {
                    test: 'UTF-8 Test: Tiếng Việt có dấu'
                },
                icon: 'package',
                color: '#3b82f6',
                actionUrl: '/admin/packages',
                actionText: 'Xem chi tiết',
                actionTextEn: 'View Details'
            };

            try {
                const response = await fetch(`${API_ENDPOINT}/notifications`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=utf-8'
                    },
                    body: JSON.stringify(notification)
                });

                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
                console.log('✅ Created notification:', data);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
                console.error('❌ Error:', error);
            }
        }

        async function getNotifications() {
            try {
                const response = await fetch(`${API_ENDPOINT}/notifications?recipientId=admin&recipientRole=admin`);
                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
                console.log('📋 Notifications:', data);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
                console.error('❌ Error:', error);
            }
        }
    </script>
</body>
</html>
